  <!-- Critical inline CSS: paints the dark theme + a branded splash instantly,
       before the main CSS/JS bundle loads. React clears #root on mount, which
       removes the splash automatically. Fonts are now self-hosted (see main.jsx). -->
  <style>
    html { background: #07070f; }
    body { margin: 0; }
    #app-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: radial-gradient(ellipse at top, #0f0f22 0%, #07070f 60%);
      font-family: "Space Grotesk", system-ui, sans-serif;
    }
    #app-splash .mj {
      font-size: 3rem; font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(120deg, #6366f1, #8b5cf6 40%, #22d3ee);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: splashPulse 1.3s ease-in-out infinite;
    }
    #app-splash .mj span { color: #6366f1; -webkit-text-fill-color: #6366f1; }
    #app-splash .bar { width: 120px; height: 3px; border-radius: 3px; overflow: hidden; background: rgba(255,255,255,0.08); }
    #app-splash .bar::before {
      content: ""; display: block; width: 40%; height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #6366f1, #22d3ee);
      animation: splashSlide 1.1s ease-in-out infinite;
    }
    @keyframes splashPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
    @keyframes splashSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    @media (prefers-reduced-motion: reduce) {
      #app-splash .mj, #app-splash .bar::before { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="app-splash" aria-hidden="true">
      <div class="mj">MJ<span>.</span></div>
      <div class="bar"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
